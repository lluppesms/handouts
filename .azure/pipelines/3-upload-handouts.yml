# ------------------------------------------------------------------------------------------------------------------------
# Pipeline: Upload Handouts to Azure Storage
# Syncs the handouts/ folder to the Azure Blob Storage container
# ------------------------------------------------------------------------------------------------------------------------
trigger: none

parameters:
  - name: deployEnvironment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod

variables:
  - template: vars/variables.yml

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: UploadHandouts
    displayName: 'Upload Handouts (${{ parameters.deployEnvironment }})'
    jobs:
      - deployment: Upload
        displayName: 'Upload Handout Files'
        environment: ${{ parameters.deployEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Get Storage Account Name'
                  inputs:
                    azureSubscription: 'your-service-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      RG_NAME="$(resourceGroupPrefix)-${{ parameters.deployEnvironment }}"
                      STORAGE_NAME=$(az storage account list --resource-group "$RG_NAME" --query "[0].name" -o tsv)
                      echo "##vso[task.setvariable variable=STORAGE_ACCOUNT_NAME]$STORAGE_NAME"
                      echo "Found storage account: $STORAGE_NAME"

                - task: AzureCLI@2
                  displayName: 'Upload Handouts to Blob Storage'
                  inputs:
                    azureSubscription: 'your-service-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      if [ -z "$(ls -A handouts/ 2>/dev/null)" ]; then
                        echo "⚠️ No files found in handouts/ folder. Skipping upload."
                        exit 0
                      fi
                      
                      echo "📤 Uploading handouts to storage account: $(STORAGE_ACCOUNT_NAME)"
                      az storage blob upload-batch \
                        --source handouts/ \
                        --destination handouts \
                        --account-name "$(STORAGE_ACCOUNT_NAME)" \
                        --auth-mode login \
                        --overwrite true
                      
                      echo "✅ Handouts uploaded successfully"
