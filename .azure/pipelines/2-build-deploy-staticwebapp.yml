# ------------------------------------------------------------------------------------------------------------------------
# Pipeline to build and deploy Lyle's Handouts Static Web App
# ------------------------------------------------------------------------------------------------------------------------
trigger: none

parameters:
  - name: deployEnvironment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod
  - name: deploymentMode
    displayName: 'Deployment Mode'
    type: string
    default: 'Incremental'
    values:
      - Incremental
      - Validate

variables:
  - template: vars/variables.yml

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: DeployInfrastructure
    displayName: 'Deploy Infrastructure (${{ parameters.deployEnvironment }})'
    jobs:
      - deployment: DeployBicep
        displayName: 'Deploy Bicep Templates'
        environment: ${{ parameters.deployEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: steps/bicep-deploy.yml
                  parameters:
                    azureSubscription: 'your-service-connection'
                    resourceGroupName: '$(resourceGroupPrefix)-${{ parameters.deployEnvironment }}'
                    location: '$(resourceGroupLocation)'
                    templatePath: '$(templatePath)'
                    templateFile: '$(templateFile)'
                    parameterFile: '$(parameterFile)'
                    deploymentMode: '${{ parameters.deploymentMode }}'

  - stage: BuildAndDeployWebsite
    displayName: 'Build and Deploy Website'
    dependsOn: DeployInfrastructure
    condition: and(succeeded(), eq('${{ parameters.deploymentMode }}', 'Incremental'))
    jobs:
      - deployment: DeployWebsite
        displayName: 'Build and Deploy Static Web App'
        environment: ${{ parameters.deployEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: steps/staticwebapp-build-deploy.yml
                  parameters:
                    azureSubscription: 'your-service-connection'
                    rootDirectory: '$(websiteRootDirectory)'
                    appName: '$(appName)'
