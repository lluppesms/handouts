# ------------------------------------------------------------------------------------------------------------------------
# Pipeline Variables for Lyle's Handouts Website
# ------------------------------------------------------------------------------------------------------------------------
variables:
  # Variable Group - create this in Azure DevOps Library
  # Contains: AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, CICD_CLIENT_ID
  - group: 'HandoutsWebsite'

  # Application configuration
  - name: appName
    value: '$(APP_NAME)'
  - name: resourceGroupPrefix
    value: '$(RESOURCE_GROUP_PREFIX)'
  - name: resourceGroupLocation
    value: '$(RESOURCE_GROUP_LOCATION)'
  - name: instanceNumber
    value: '$(INSTANCE_NUMBER)'
  - name: environmentCode
    value: 'dev'

  # Bicep paths
  - name: templatePath
    value: 'infra/bicep'
  - name: templateFile
    value: 'main.bicep'
  - name: parameterFile
    value: 'main.parameters.json'

  # Website paths
  - name: websiteRootDirectory
    value: 'src/website'
