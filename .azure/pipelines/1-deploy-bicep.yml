# ------------------------------------------------------------------------------------------------------------------------
# Pipeline to deploy Bicep infrastructure for Lyle's Handouts Website
# ------------------------------------------------------------------------------------------------------------------------
trigger: none

parameters:
  - name: deployEnvironment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod
  - name: deploymentMode
    displayName: 'Deployment Mode'
    type: string
    default: 'Incremental'
    values:
      - Incremental
      - Validate
      - Complete

variables:
  - template: vars/variables.yml

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: DeployInfrastructure
    displayName: 'Deploy Infrastructure (${{ parameters.deployEnvironment }})'
    jobs:
      - deployment: DeployBicep
        displayName: 'Deploy Bicep Templates'
        environment: ${{ parameters.deployEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: steps/bicep-deploy.yml
                  parameters:
                    azureSubscription: 'your-service-connection'
                    resourceGroupName: '$(resourceGroupPrefix)-${{ parameters.deployEnvironment }}'
                    location: '$(resourceGroupLocation)'
                    templatePath: '$(templatePath)'
                    templateFile: '$(templateFile)'
                    parameterFile: '$(parameterFile)'
                    deploymentMode: '${{ parameters.deploymentMode }}'
