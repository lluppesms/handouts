# ------------------------------------------------------------------------------------------------------------------------
# Reusable Step Template: Build and Deploy Static Web App
# ------------------------------------------------------------------------------------------------------------------------
parameters:
  - name: azureSubscription
    type: string
  - name: rootDirectory
    type: string
    default: 'src/website'
  - name: appName
    type: string

steps:
  - task: NodeTool@0
    displayName: 'Setup Node.js 20'
    inputs:
      versionSpec: '20.x'

  - script: npm ci
    displayName: 'Install Dependencies'
    workingDirectory: '${{ parameters.rootDirectory }}'

  - script: npm run build
    displayName: 'Build Website'
    workingDirectory: '${{ parameters.rootDirectory }}'

  - task: AzureCLI@2
    displayName: 'Get SWA Deployment Token'
    inputs:
      azureSubscription: '${{ parameters.azureSubscription }}'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        SWA_NAME=$(az staticwebapp list --query "[?contains(name, '${{ parameters.appName }}')].name" -o tsv | head -1)
        SWA_TOKEN=$(az staticwebapp secrets list --name "$SWA_NAME" --query "properties.apiKey" -o tsv)
        echo "##vso[task.setvariable variable=SWA_DEPLOYMENT_TOKEN;issecret=true]$SWA_TOKEN"
        echo "##vso[task.setvariable variable=SWA_NAME]$SWA_NAME"

  - task: AzureStaticWebApp@0
    displayName: 'Deploy Static Web App'
    inputs:
      workingDirectory: '${{ parameters.rootDirectory }}'
      app_location: '.'
      output_location: 'dist'
      skip_app_build: true
      azure_static_web_apps_api_token: '$(SWA_DEPLOYMENT_TOKEN)'
