# ------------------------------------------------------------------------------------------------------------------------
# Reusable Step Template: Deploy Bicep Infrastructure
# ------------------------------------------------------------------------------------------------------------------------
parameters:
  - name: azureSubscription
    type: string
  - name: resourceGroupName
    type: string
  - name: location
    type: string
  - name: templatePath
    type: string
  - name: templateFile
    type: string
  - name: parameterFile
    type: string
  - name: deploymentMode
    type: string
    default: 'Incremental'

steps:
  - task: qetza.replacetokens.replacetokens-task.replacetokens@6
    displayName: 'Replace Tokens in Parameter File'
    inputs:
      targetFiles: '${{ parameters.templatePath }}/${{ parameters.parameterFile }}'

  - task: AzureCLI@2
    displayName: 'Create Resource Group'
    inputs:
      azureSubscription: '${{ parameters.azureSubscription }}'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az group create --name ${{ parameters.resourceGroupName }} --location ${{ parameters.location }}

  - task: AzureResourceManagerTemplateDeployment@3
    displayName: 'Deploy Bicep Templates'
    inputs:
      deploymentScope: 'Resource Group'
      azureResourceManagerConnection: '${{ parameters.azureSubscription }}'
      resourceGroupName: '${{ parameters.resourceGroupName }}'
      location: '${{ parameters.location }}'
      templateLocation: 'Linked artifact'
      csmFile: '${{ parameters.templatePath }}/${{ parameters.templateFile }}'
      csmParametersFile: '${{ parameters.templatePath }}/${{ parameters.parameterFile }}'
      deploymentMode: '${{ parameters.deploymentMode }}'
      deploymentName: 'deploy-$(Build.BuildNumber)'
